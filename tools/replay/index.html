<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>球球对决 Replay Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030607;
      --panel: #111c22;
      --line: #294957;
      --text: #f4f7fb;
      --muted: #9eb3bf;
      --accent: #19c2b1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 360px;
    }
    main { min-width: 0; display: flex; flex-direction: column; }
    canvas {
      width: 100%;
      height: calc(100vh - 76px);
      display: block;
      background: #030607;
    }
    .topbar {
      height: 76px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #081116;
    }
    .title { font-size: 20px; font-weight: 800; }
    .stat { color: var(--muted); font-size: 13px; }
    aside {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
      height: 100vh;
    }
    label { display: block; margin-top: 12px; color: var(--muted); font-size: 13px; }
    select, input, button, textarea {
      width: 100%;
      margin-top: 6px;
      border: 1px solid #2a4552;
      border-radius: 8px;
      background: #081116;
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      background: #153830;
      border-color: #1e776b;
      color: #d8fff9;
      font-weight: 700;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; }
    .spawn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
    .spawn-grid label { margin-top: 0; }
    .toggle-line { display: flex; align-items: center; gap: 8px; margin-top: 12px; color: var(--muted); font-size: 13px; }
    .toggle-line input { width: auto; margin: 0; }
    .log {
      height: 180px;
      resize: vertical;
      color: #d8fff9;
      font-size: 12px;
      line-height: 1.4;
    }
    .cards { display: grid; gap: 8px; margin-top: 14px; }
    .card {
      border: 1px solid #2a4552;
      border-radius: 8px;
      padding: 10px;
      background: #0c171d;
    }
    .hp {
      height: 8px;
      background: #2a4552;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .hp > i { display: block; height: 100%; background: var(--accent); }
    @media (max-width: 980px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 52px minmax(0, 1fr) 224px;
      }
      main { display: contents; }
      .topbar {
        height: 52px;
        padding: 6px 10px;
      }
      .title { font-size: 15px; }
      .stat { font-size: 11px; }
      canvas {
        width: 100vw;
        height: calc(100vh - 276px);
        min-height: 0;
      }
      aside {
        height: 224px;
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 8px;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: min-content;
        gap: 6px 8px;
      }
      label { margin-top: 0; font-size: 11px; }
      select, input, button, textarea {
        margin-top: 3px;
        border-radius: 6px;
        padding: 6px 7px;
        font-size: 12px;
      }
      .row {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .buttons {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
        margin-top: 0;
      }
      .spawn-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 4px;
        margin-top: 0;
      }
      .toggle-line {
        margin-top: 0;
        font-size: 11px;
      }
      .cards {
        grid-column: 1 / -1;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-top: 0;
      }
      .card {
        border-radius: 6px;
        padding: 6px;
        min-width: 0;
      }
      .card b {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
      }
      .card .stat { font-size: 10px; }
      .hp { height: 6px; margin-top: 5px; }
      aside > label:last-child {
        display: none;
      }
    }
    @media (max-width: 980px) and (max-height: 720px) {
      body { grid-template-rows: 46px minmax(0, 1fr) 196px; }
      aside { height: 196px; }
      .topbar { height: 46px; }
      canvas { height: calc(100vh - 242px); }
      .buttons button { padding-left: 2px; padding-right: 2px; }
      .cards { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <div class="title">球球对决 Replay Viewer</div>
        <div class="stat" id="status">等待加载</div>
      </div>
    </div>
    <canvas id="arena"></canvas>
  </main>
  <aside>
    <div class="row">
      <label>左侧球
        <select id="ballA"></select>
      </label>
      <label>右侧球
        <select id="ballB"></select>
      </label>
    </div>
    <div class="row">
      <label>地图
        <select id="map"></select>
      </label>
      <label>Seed
        <input id="seed" type="number" value="20260630">
      </label>
    </div>
    <div class="row">
      <label>倍速
        <select id="speed">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
          <option value="8">8x</option>
        </select>
      </label>
      <label>采样帧
        <input id="sampleEvery" type="number" value="12" min="1">
      </label>
    </div>
    <label>A1 初始位置 / 方向
      <div class="spawn-grid">
        <label>X<input id="spawnAX" type="number" value="-280" step="10"></label>
        <label>Y<input id="spawnAY" type="number" value="-40" step="10"></label>
        <label>角度<input id="angleA" type="number" value="18" step="5"></label>
      </div>
    </label>
    <label>B1 初始位置 / 方向
      <div class="spawn-grid">
        <label>X<input id="spawnBX" type="number" value="280" step="10"></label>
        <label>Y<input id="spawnBY" type="number" value="40" step="10"></label>
        <label>角度<input id="angleB" type="number" value="198" step="5"></label>
      </div>
    </label>
    <label class="toggle-line">
      <input id="soundEnabled" type="checkbox" checked>
      <span>开启音效</span>
    </label>
    <div class="buttons">
      <button id="restart">重开</button>
      <button id="pause">暂停</button>
      <button id="step">单帧</button>
    </div>
    <div class="buttons">
      <button id="exportLog">导出记录</button>
      <button id="copyConfig">复制配置</button>
      <button id="randomSeed">随机Seed</button>
    </div>
    <div class="cards" id="cards"></div>
    <label>事件 / 记录
      <textarea id="log" class="log" readonly></textarea>
    </label>
  </aside>
  <script src="./replay_bundle.js?v=replay-controls-audio-20260701a"></script>
  <script src="./viewer.js?v=replay-controls-audio-20260701a"></script>
</body>
</html>
